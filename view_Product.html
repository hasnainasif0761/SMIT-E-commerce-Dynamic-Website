<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>View Products</title>
    <script src="https://cdn.tailwindcss.com"></script>

    <!-- Tailwind -->
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body>
        <!-- Overlay -->
    <div id="editModal" class="fixed inset-0 bg-black/50 backdrop-blur-sm flex justify-center items-center z-50 hidden">

        <!-- Modal Box -->
        <div class="w-[90%] md:w-[500px] bg-white rounded-2xl shadow-2xl p-6 animate-[fadeIn_.3s_ease]">

            <!-- Header -->
            <div class="flex justify-between items-center border-b pb-3">
                <h2 class="text-xl font-bold text-gray-800">Edit Product</h2>
                <button id="closeModal" class="text-gray-500 hover:text-red-500 text-2xl">&times;</button>
            </div>

            <!-- Form -->
            <div class="EditInputCont flex flex-col gap-4 mt-4">

                <input type="text" placeholder="Image URL"
                    class="img w-full border rounded-lg px-3 py-2 focus:outline-none focus:ring-2 focus:ring-green-400">

                <input type="text" placeholder="Product Name"
                    class="name w-full border rounded-lg px-3 py-2 focus:outline-none focus:ring-2 focus:ring-green-400">

                <textarea placeholder="Description"
                    class="desc w-full border rounded-lg px-3 py-2 focus:outline-none focus:ring-2 focus:ring-green-400"></textarea>

                <input type="text" placeholder="Price"
                    class="price w-full border rounded-lg px-3 py-2 focus:outline-none focus:ring-2 focus:ring-green-400">

                <!-- Button -->
                <button class="editnowBtn w-full bg-green-500 hover:bg-green-600 text-white py-2 rounded-lg font-semibold active:scale-95 transition">
                    Update Product
                </button>

            </div>
        </div>
    </div>
    <h1 class="text-3xl font-bold text-center py-5">All Products</h1>

    <!-- Product Container -->
    <div id="productContainer" 
        class="w-full py-3 grid grid-cols-2 md:grid-cols-4 gap-4 px-4">
        
    </div>

    <script type="module" src="./js/view_Product.js"></script>
</body>
</html>
