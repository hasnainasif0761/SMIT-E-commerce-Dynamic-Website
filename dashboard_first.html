<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard Analytic</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body>
    <div class="w-full border grid md:grid-cols-3 px-5 gap-2 mt-5 py-2">
        <div class="w-full h-[200px] border bg-white rounded-lg">
            <p class="text-3xl font-semibold mt-10 text-center">Total Emails</p>
            <p class="text-4xl font-bold text-center mt-5">12</p>
        </div>
        <div class="w-full h-[200px] border bg-white rounded-lg">
            <p class="text-3xl font-semibold mt-10 text-center">Total Products</p>
            <p class="text-4xl font-bold text-center mt-5">10</p>
        </div>
        <div class="w-full h-[200px] border bg-white rounded-lg">
            <p class="text-3xl font-semibold mt-10 text-center">Total Sales</p>
            <p class="text-4xl font-bold text-center mt-5">1200</p>
        </div>
    </div>
</body>
</html>
