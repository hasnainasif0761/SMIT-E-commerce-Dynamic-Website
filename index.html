<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://cdn.jsdelivr.net/npm/remixicon@4.9.0/fonts/remixicon.css" rel="stylesheet"/>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body>
    <header>
        <div class="navLogo">
            <img src="./img/logo.png" alt="">
            <div id="hamburger">
                <i class="ri-menu-line md:hidden text-3xl text-white"></i>
            </div>
        </div>
        <nav class="navbar">
            <ul class="navList">
                <li><a href="#" class="link">HOME</a></li>
                <li><a href="#" class="link">SHOP</a></li>
                <li><a href="#" class="link">TESTIMONIAL</a></li>
                <li><a href="#" class="link">ABOUT</a></li>
                <li><a href="#" class="link">COntact</a></li>
                <li class="link">
                    <i class="ri-shopping-bag-fill bag-icon"></i>
                    <span>0</span>
                </li>
            </ul>
            <div class="hamburger" style="display: none;"></div>
        </nav>
        <div class="banner-container">
            <div class="banner-inner-cont">
                <p class="text-[17px] font-[600] text-white mb-8">A WHOLE NEW LOOK</p>
                <h1 class="uppercase text-5xl md:text-8xl text-white mb-5 font-[500]">BEAuty <br> pronounced</h1>
                <p class="text-white text-[18px] [font-family:'DM Sans',sans-serif]">We craft skincare and cosmetics that highlight your natural glow, bringing confidence to every expression. Subtle, refined, and effortlessly radiant—this is beauty, pronounced.</p>
                <button class="border mt-[45px] text-white px-9 py-3 font-semibold border-2  hover:bg-white hover:text-green-800 transition-all duration-400">View more</button>
            </div>
        </div>
        <!-- <section class="w-full h-[400px] border"></section> -->
    </header>
    <script src="script.js"></script>
</body>
</html>
